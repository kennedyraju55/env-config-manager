<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <!-- Card 1 -->
  <rect x="20" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#f72585" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="20" width="240" height="4" rx="2" fill="#f72585"/>
  <text x="140" y="60" text-anchor="middle" font-size="28">🔐</text>
  <text x="140" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Secret Detection</text>
    <text x="140" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">8 pattern categories:</text>
    <text x="140" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">API keys, tokens, passwords</text>

  <!-- Card 2 -->
  <rect x="280" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#f72585" stroke-width="1.5" opacity="0.95"/>
  <rect x="280" y="20" width="240" height="4" rx="2" fill="#f72585"/>
  <text x="400" y="60" text-anchor="middle" font-size="28">🔄</text>
  <text x="400" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Env Comparison</text>
    <text x="400" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Diff two environments</text>
    <text x="400" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">with change tracking</text>

  <!-- Card 3 -->
  <rect x="540" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#f72585" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="20" width="240" height="4" rx="2" fill="#f72585"/>
  <text x="660" y="60" text-anchor="middle" font-size="28">📝</text>
  <text x="660" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Template Generator</text>
    <text x="660" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Project-type templates:</text>
    <text x="660" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Flask, Django, Express, etc.</text>

  <!-- Card 4 -->
  <rect x="20" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#f72585" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="185" width="240" height="4" rx="2" fill="#f72585"/>
  <text x="140" y="225" text-anchor="middle" font-size="28">🛡️</text>
  <text x="140" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Security Audit</text>
    <text x="140" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Weak value detection</text>
    <text x="140" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">and length validation</text>

  <!-- Card 5 -->
  <rect x="280" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#f72585" stroke-width="1.5" opacity="0.95"/>
  <rect x="280" y="185" width="240" height="4" rx="2" fill="#f72585"/>
  <text x="400" y="225" text-anchor="middle" font-size="28">📦</text>
  <text x="400" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Migration Scripts</text>
    <text x="400" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Auto-generate shell scripts</text>
    <text x="400" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">for env migration</text>

  <!-- Card 6 -->
  <rect x="540" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#f72585" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="185" width="240" height="4" rx="2" fill="#f72585"/>
  <text x="660" y="225" text-anchor="middle" font-size="28">🤖</text>
  <text x="660" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">AI Validation</text>
    <text x="660" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">LLM-powered deep analysis</text>
    <text x="660" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">for 12-factor compliance</text>

</svg>